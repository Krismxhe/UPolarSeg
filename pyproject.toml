[tool.pytest.ini_options]
# Run pytest from the repo root so `import src...` resolves.
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Conservative default rule set; expand later as the codebase stabilises.
select = ["E", "F", "I"]
ignore = ["E501"]  # line length handled separately; long config strings are common
