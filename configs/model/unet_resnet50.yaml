# UNet — classic encoder-decoder with skip connections
# Supported encoders: resnet18/34/50/101, efficientnet-b0~b7,
#                     mit_b0~b5, mobilenet_v2, vgg11~19, densenet121 ...
# Full list: https://smp.readthedocs.io/en/latest/encoders.html
arch: Unet
encoder: resnet50
encoder_weights: imagenet   # "imagenet" or null (random init)
in_channels: 3
