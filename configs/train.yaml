# ──────────────────────────────────────────────────────────────────────────────
# Main training config. Override any field on the command line, e.g.:
#   python train.py model=deeplabv3plus train.lr=1e-4 train.batch_size=4
# ──────────────────────────────────────────────────────────────────────────────

defaults:
  - model: unet
  - dataset: multiclass
  - augmentation: medium
  - optimizer: adamw
  - loss: dice_ce
  - task: default
  - polar: disabled
  - _self_

# ── Training hyper-parameters ─────────────────────────────────────────────────
train:
  epochs: 150
  batch_size: 4
  img_size: 512           # images are resized to (img_size × img_size)
  num_workers: 4
  seed: 42
  val_interval: 1         # run validation every N epochs
  precision: "32-true"    # "16-mixed" for AMP, "32-true" for full precision
  early_stopping: True
  early_stopping_patience: 20

# ── Hardware / distributed training ──────────────────────────────────────────
hardware:
  accelerator: auto         # "auto", "gpu", "cpu"
  devices: auto             # "auto", integer count, or list e.g. [0,1]
  num_nodes: 1              # number of machines
  strategy: auto            # "auto", "ddp", "ddp_find_unused_parameters_false", "fsdp"

# ── Checkpoint ────────────────────────────────────────────────────────────────
checkpoint:
  monitor: val/dice_mean  # metric to monitor for saving best model
  mode: max
  save_top_k: 1           # saves best.ckpt; last.ckpt is always saved separately
  filename: "best"

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  logger: tensorboard     # "tensorboard" or "wandb"
  project: seg-baseline   # wandb project name (ignored for tensorboard)
  name: "${model.arch}_${model.encoder}_${dataset.name}"
  save_dir: outputs

# ── Evaluation split (used by evaluate.py) ────────────────────────────────────
split: test               # "train", "val", or "test"

# ── Evaluation CSV export (used by evaluate.py; ignored by train.py) ──────────
eval:
  save_csv: true            # write summary/per_class/per_case CSV
  save_predictions: false   # (not implemented yet) save predicted masks
  save_overlay: false       # (not implemented yet) save colour overlays
  threshold: 0.5            # binary: sigmoid(logits) > threshold
  include_background: false # exclude background from mean_* unless true
  output_dir: null          # default: <save_dir>/<logging.name>/eval/<split>
  per_case: true
  per_class: true

# ── Multi-task model knobs (Phase 9b; merged into the selected model config) ──
# All OFF by default. Consumed by future custom models that expose decoder
# features / heads; SMP baselines ignore them, so the baseline is unaffected.
model:
  return_features: false
  heads:
    boundary:
      enabled: false
    clinical:
      enabled: false
