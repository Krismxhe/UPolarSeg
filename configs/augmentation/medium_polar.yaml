# Medium augmentation — good general-purpose default
random_resized_crop:
  enabled: true
  scale: [0.5, 1.0]
horizontal_flip:
  enabled: false
  p: 0.5
vertical_flip:
  enabled: true
  p: 0.5
random_rotate90:
  enabled: false
  p: 0.5
elastic:
  enabled: false
  p: 0.3
grid_distortion:
  enabled: false
  p: 0.3
color_jitter:
  enabled: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.1
  p: 0.5
gaussian_blur:
  enabled: true
  sigma_limit: [0.1, 2.0]
  p: 0.3
gaussian_noise:
  enabled: false
  p: 0.2
normalize:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
